databases:
  - name: quant-db
    plan: free
    databaseName: quant_pipeline

services:
  - type: web
    name: quant-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quant-db
          property: connectionString
